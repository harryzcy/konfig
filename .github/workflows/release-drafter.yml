name: Release Drafter

on:
  push:
    branches:
      - main
    tags-ignore:
      - 'v*'
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  update:
    name: Generate Notes
    permissions:
      contents: write
      pull-requests: write
    uses: harryzcy/github-actions/.github/workflows/release-drafter.yml@4ebcdf92829ed99e2415853b7122f808008b23bf # main
